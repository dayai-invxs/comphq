<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <clipPath id="c">
      <circle cx="256" cy="256" r="244"/>
    </clipPath>
  </defs>
  <!-- Background -->
  <circle cx="256" cy="256" r="256" fill="#0f0f0f"/>
  <g clip-path="url(#c)">
    <!-- Vertical divider -->
    <line x1="190" y1="0" x2="190" y2="512" stroke="#f97316" stroke-width="4" opacity="0.5"/>
    <!-- HQ monogram — simplified glyph for favicon -->
    <text x="210" y="310" text-anchor="start" fill="#ffffff"
      font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="180">H</text>
    <text x="320" y="310" text-anchor="start" fill="#f97316"
      font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="180">Q</text>
  </g>
  <!-- Accent ring -->
  <circle cx="256" cy="256" r="244" fill="none" stroke="#f97316" stroke-width="16"/>
</svg>
