name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npx tsc --noEmit

      - run: npm test

      - run: npm run build
        env:
          SUPABASE_URL: https://build.supabase.co
          SUPABASE_SERVICE_KEY: build-placeholder
          NEXTAUTH_SECRET: build-placeholder

      # Fails if `supabase/migrations/*` has changed without regenerating
      # `src/lib/db-types.ts`. Skipped when the optional access token secret
      # isn't configured (first-run projects).
      - name: Verify db-types is up to date
        if: ${{ env.SUPABASE_ACCESS_TOKEN != '' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          npx supabase link --project-ref "$SUPABASE_PROJECT_REF"
          npm run db:types
          git diff --exit-code src/lib/db-types.ts
